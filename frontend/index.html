<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="shortcut icon" href="./images/wallet.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ================= LOGIN PAGE ================= -->
    <div id="login-page">

        <div class="solid-circle"></div>

        <div id="login-header">
            <h1>Expense Tracker <span><img
                        src="https://static.vecteezy.com/system/resources/previews/005/630/018/original/digital-wallet-icon-vector.jpg"
                        width="50px" alt=""></span></h1>
        </div>

        <div class="login-container">
            <p>Hello, Please Enter your</p>
            <h1>Name</h1>

            <div class="form-floating mb-3 w-100">
                <input type="text" class="form-control" id="username" placeholder="Name">
                <label>Name</label>
            </div>

            <button id="login-btn">Login</button>
        </div>

    </div>


    <!-- ================= HOME PAGE ================= -->
    <div id="home-page" style="display:none;">

        <div class="header">
            <h1>Expense Tracker <span><img
                        src="https://static.vecteezy.com/system/resources/previews/005/630/018/original/digital-wallet-icon-vector.jpg"
                        width="50px" alt=""></span></h1>
            <button class="btn btn-danger" id="logout-btn">Logout</button>
        </div>

        <div class="inputs mt-5">
            <input type="number" class="form-control" id="amount" placeholder="Amount">

            <div class="radio-group">
                <input type="radio" name="transaction" id="incomeRadio"> Income
                <input type="radio" name="transaction" id="expenseRadio"> Expense
            </div>

            <input type="date" class="form-control" id="date">
            <button class="btn btn-primary" id="add-btn">+</button>
        </div>

        <div class="cards">
            <div class="card">
                <h5>Total Income</h5>
                <p id="income-amt">0</p>
            </div>

            <div class="card">
                <h5>Total Expense</h5>
                <p id="expense-amt">0</p>
            </div>

            <div class="card">
                <h5>Balance</h5>
                <p id="balance-amt">0</p>
            </div>
        </div>

        <table class="table mt-5 text-center container">
            <thead class="table-primary">
                <tr>
                    <th>Amount</th>
                    <th>Type</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

    </div>

    <script src="script.js"></script>
</body>

</html>
